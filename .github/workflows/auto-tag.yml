name: Auto-Tag on Main

# When code lands on main (via merge or direct push),
# read the VERSION file and create a git tag if it doesn't exist.
# This triggers the Release workflow automatically.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  auto-tag:
    name: Create version tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for tag checking

      - name: Read VERSION file
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} does not exist. Will create."
          fi

      - name: Verify version is synced
        if: steps.check.outputs.exists == 'false'
        run: ./scripts/version-sync.sh --check

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          echo "Created and pushed tag: ${{ steps.version.outputs.tag }}"
